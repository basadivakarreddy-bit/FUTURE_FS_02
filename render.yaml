services:
  # Backend Server
  - type: web
    name: mini-crm-server
    env: node
    buildCommand: npm install && cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production

  # Frontend Client
  - type: static_site
    name: mini-crm-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mini-crm-server.onrender.com # IMPORTANT: Update this after server deployment
